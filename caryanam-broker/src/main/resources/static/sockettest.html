<!DOCTYPE html>
<html>
<head>
  <title>Socket Chat Test</title>
</head>
<body>

<h2>Socket Chat</h2>

<p id="info"></p>

<input type="text" id="msg" placeholder="Enter message">
<button id="sendBtn">Send</button>

<ul id="messages"></ul>

<script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/2.3.0/socket.io.js"></script>

<script>
  const urlParams = new URLSearchParams(window.location.search);

  const USER_ID = urlParams.get("userId");
  const ADMIN_ID = urlParams.get("adminId");

  let CURRENT_ID = null;
  let RECEIVER_ID = null;
  let IS_ADMIN = false;

  if (USER_ID) {
    CURRENT_ID = Number(USER_ID);
    RECEIVER_ID = 2; // admin id
    document.getElementById("info").innerText = "USER: " + CURRENT_ID;
  }
  else if (ADMIN_ID) {
    CURRENT_ID = Number(ADMIN_ID);
    RECEIVER_ID = 1; // user id
    IS_ADMIN = true;
    document.getElementById("info").innerText = "ADMIN: " + CURRENT_ID;
  } else {
    alert("Pass userId or adminId");
    throw new Error("Missing ID");
  }


  const ROOM_ID =
          CURRENT_ID < RECEIVER_ID
                  ? CURRENT_ID + "_" + RECEIVER_ID
                  : RECEIVER_ID + "_" + CURRENT_ID;


  // ✅ ADDED HISTORY CODE (no change to your existing logic)
  fetch(`http://localhost:8080/chat/history/${ROOM_ID}`)
          .then(res => res.json())
          .then(messages => {
            messages.forEach(msg => {
              const li = document.createElement("li");

              if (msg.senderId === CURRENT_ID) {
                li.innerText = "YOU: " + msg.message;
              } else {
                li.innerText = msg.senderRole === "ADMIN"
                        ? "ADMIN: " + msg.message
                        : "USER: " + msg.message;
              }

              document.getElementById("messages").appendChild(li);
            });
          })
          .catch(err => console.error("History error:", err));


  const socket = io("http://localhost:9092", {
    transports: ["websocket"],
    query: IS_ADMIN
            ? { adminId: CURRENT_ID }
            : { userId: CURRENT_ID }
  });

  socket.on("connect", () => {
    console.log("Connected:", socket.id);
    socket.emit("join_room", ROOM_ID);
  });


  socket.off("receive_message");


  let lastMessageKey = "";

  socket.on("receive_message", (data) => {
    console.log("RECEIVED:", data);


    if (data.roomId !== ROOM_ID) return;


    const messageKey = data.senderId + "_" + data.message + "_" + data.time;
    if (messageKey === lastMessageKey) return;
    lastMessageKey = messageKey;

    const li = document.createElement("li");

    if (data.senderId === CURRENT_ID) {
      li.innerText = "YOU: " + data.message;
    } else {
      li.innerText = IS_ADMIN
              ? "USER: " + data.message
              : "ADMIN: " + data.message;
    }

    document.getElementById("messages").appendChild(li);
  });


  socket.on("typing", (data) => {
    if (data.roomId !== ROOM_ID) return;

    let typingEl = document.getElementById("typing");

    if (!typingEl) {
      typingEl = document.createElement("p");
      typingEl.id = "typing";
      document.body.appendChild(typingEl);
    }

    if (data.typing && data.userId !== CURRENT_ID) {
      typingEl.innerText = IS_ADMIN ? "User typing..." : "Admin typing...";
    } else {
      typingEl.innerText = "";
    }
  });

  function sendMessage() {
    const input = document.getElementById("msg");
    const msg = input.value.trim();

    if (!msg) return;

    const payload = {
      roomId: ROOM_ID,
      senderId: CURRENT_ID,
      receiverId: RECEIVER_ID,
      senderRole: IS_ADMIN ? "ADMIN" : "USER",
      message: msg
    };

    console.log("Sending:", payload);

    socket.emit("send_message", payload);

    input.value = "";
  }

  document.getElementById("sendBtn").onclick = sendMessage;

  document.getElementById("msg").addEventListener("keypress", function(e) {
    if (e.key === "Enter") {
      sendMessage();
    }
  });


  document.getElementById("msg").addEventListener("input", function() {

    socket.emit("typing", {
      roomId: ROOM_ID,
      userId: CURRENT_ID,
      typing: true
    });

    clearTimeout(window.typingTimeout);

    window.typingTimeout = setTimeout(() => {
      socket.emit("typing", {
        roomId: ROOM_ID,
        userId: CURRENT_ID,
        typing: false
      });
    }, 800);
  });

</script>

</body>
</html>
